<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">buildER logo</title>
  <desc id="desc">buildER wordmark with a transparent background and an entity-relationship diagram icon.</desc>
  <defs>
    <linearGradient id="builderGradient" x1="54" y1="58" x2="256" y2="246" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="328" y1="76" x2="763" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <style>
      .wordmark-shadow { fill: rgba(15, 23, 42, 0.16); }
      .tagline { fill: #475569; }
      @media (prefers-color-scheme: dark) {
        .wordmark-shadow { fill: rgba(248, 250, 252, 0.08); }
        .tagline { fill: #CBD5E1; }
      }
    </style>
  </defs>

  <!-- ER icon -->
  <g transform="translate(48 38)">
    <path d="M112 44L198 94V194L112 244L26 194V94L112 44Z" stroke="url(#builderGradient)" stroke-width="12" stroke-linejoin="round"/>
    <rect x="58" y="82" width="108" height="58" rx="14" stroke="url(#builderGradient)" stroke-width="10"/>
    <path d="M112 140V169" stroke="url(#builderGradient)" stroke-width="10" stroke-linecap="round"/>
    <path d="M67 169H157L112 216L67 169Z" stroke="url(#builderGradient)" stroke-width="10" stroke-linejoin="round"/>
    <circle cx="25" cy="94" r="11" fill="#22D3EE"/>
    <circle cx="199" cy="94" r="11" fill="#3B82F6"/>
    <circle cx="199" cy="194" r="11" fill="#818CF8"/>
    <circle cx="25" cy="194" r="11" fill="#A855F7"/>
    <path d="M58 111H25" stroke="url(#builderGradient)" stroke-width="9" stroke-linecap="round"/>
    <path d="M166 111H199" stroke="url(#builderGradient)" stroke-width="9" stroke-linecap="round"/>
    <path d="M157 193H199" stroke="url(#builderGradient)" stroke-width="9" stroke-linecap="round"/>
    <path d="M67 193H25" stroke="url(#builderGradient)" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(324 78)">
    <text x="4" y="121" class="wordmark-shadow" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="126" font-weight="850" letter-spacing="-4">buildER</text>
    <text x="0" y="116" fill="url(#textGradient)" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="126" font-weight="850" letter-spacing="-4">buildER</text>
    <text x="6" y="173" class="tagline" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="0.4">ER modeling, SQL reverse engineering and live ERS synchronization</text>
  </g>
</svg>
